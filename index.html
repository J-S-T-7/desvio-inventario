<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desvío de Inventario - Ajuste Gluten</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden">
        <div class="bg-slate-900 p-6">
            <h1 class="text-white text-3xl font-bold text-center tracking-tight">CONTROL DE DESVÍO DE INVENTARIO</h1>
            <p class="text-slate-400 text-center mt-2 font-mono uppercase text-xs">Ajuste técnico: Gluten Vital 25kg</p>
        </div>

        <!-- Panel de Registro -->
        <div class="p-6 bg-slate-50 border-b grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-2">
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Producto Seleccionado</label>
                <select id="producto" class="w-full p-3 border-2 border-slate-200 rounded-lg focus:border-indigo-500 outline-none transition-all font-medium">
                    <optgroup label="Materias Primas / Gran Formato">
                        <option value="25">GLUTEN VITAL DE TRIGO (Saco 25kg)</option>
                        <option value="3">MECHADA VEGGIE 500 GRS (Caja 3kg)</option>
                    </optgroup>
                    <optgroup label="Quesos (Bloques y Granulados)">
                        <option value="2.5">QUESOS BLOQUE / GRANULADO (Conv. 2.5kg)</option>
                        <option value="10">QUESO VEGANO 200 GR (Pack x10)</option>
                    </optgroup>
                    <optgroup label="Embutidos y Hamburguesas">
                        <option value="20">SALCHICHA / CHAPARRITA / VIENESA (Pack x20)</option>
                        <option value="12">BIFE / CHORIZO / VEGAN ROLL (Pack x12)</option>
                        <option value="8">HAMBURGUESA SEITAN / VEGGIEBALL (Pack x8)</option>
                        <option value="120">VEGGIEBALL HORECA (Caja x120)</option>
                        <option value="10">SEITAN DEL BUENO 500GR (Pack x10)</option>
                    </optgroup>
                    <optgroup label="Otros">
                        <option value="6">TOFU 1kg / 500g (Pack x6)</option>
                        <option value="1">PRODUCTOS A GRANEL (Caja x1)</option>
                    </optgroup>
                </select>
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Stock Sistema (Odoo)</label>
                <input type="number" id="odoo" class="w-full p-3 border-2 border-slate-200 rounded-lg outline-none focus:border-indigo-500" placeholder="0.00">
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase">Stock Real (Físico)</label>
                <input type="number" id="real" class="w-full p-3 border-2 border-slate-200 rounded-lg outline-none focus:border-indigo-500" placeholder="0">
            </div>
            <button onclick="registrar()" class="lg:col-span-4 bg-indigo-600 hover:bg-indigo-800 text-white font-black py-4 rounded-lg shadow-lg transition active:scale-95 uppercase">
                Calcular y Agregar a la Lista
            </button>
        </div>

        <!-- Tabla -->
        <div class="p-6 overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-600 text-[10px] uppercase text-left tracking-widest">
                        <th class="p-4 border-b">Producto</th>
                        <th class="p-4 border-b">Cajas Odoo</th>
                        <th class="p-4 border-b">Físico</th>
                        <th class="p-4 border-b">Diferencia</th>
                        <th class="p-4 border-b">% Desvío</th>
                        <th class="p-4 border-b text-center">Estado</th>
                    </tr>
                </thead>
                <tbody id="filas" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>

        <!-- Footer KPI -->
        <div class="bg-slate-900 p-8 border-t flex flex-col md:flex-row justify-between items-center text-white">
            <span class="font-bold text-slate-500 uppercase tracking-widest text-xs">Mesa de Ayuda - Control de Inventario</span>
            <div class="text-center md:text-right">
                <p class="text-[10px] font-bold text-indigo-400 uppercase">Margen de Error Promedio</p>
                <p id="kpi" class="text-4xl font-black">0.00%</p>
            </div>
        </div>
    </div>

    <script>
        let historialDesvios = [];

        function registrar() {
            const prod = document.getElementById('producto');
            const nombre = prod.options[prod.selectedIndex].text;
            const divisor = parseFloat(prod.value);
            const odoo = parseFloat(document.getElementById('odoo').value);
            const real = parseFloat(document.getElementById('real').value);

            if (isNaN(odoo) || isNaN(real)) return alert("Por favor, ingresa valores válidos.");

            const cajasTeoricas = odoo / divisor;
            const diferencia = real - cajasTeoricas;
            const porcentaje = cajasTeoricas === 0 ? 0 : (diferencia / cajasTeoricas);

            let estilo = "bg-emerald-100 text-emerald-800";
            let etiqueta = "OK";

            if (Math.abs(porcentaje) > 0.001) { // Tolerancia mínima
                if (porcentaje > 0) {
                    estilo = "bg-amber-100 text-amber-800";
                    etiqueta = "SOBRANTE";
                } else {
                    estilo = "bg-rose-100 text-rose-800";
                    etiqueta = "FALTANTE";
                }
            }

            const tr = `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-bold text-slate-800">${nombre}</td>
                    <td class="p-4 text-slate-500">${cajasTeoricas.toFixed(2)}</td>
                    <td class="p-4 font-black text-slate-900">${real}</td>
                    <td class="p-4 font-bold ${diferencia < 0 ? 'text-rose-600' : 'text-emerald-600'}">${diferencia.toFixed(2)}</td>
                    <td class="p-4 font-mono font-bold">${(porcentaje * 100).toFixed(2)}%</td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${estilo}">${etiqueta}</span>
                    </td>
                </tr>
            `;

            document.getElementById('filas').insertAdjacentHTML('afterbegin', tr);
            historialDesvios.push(Math.abs(porcentaje));
            
            const promedio = (historialDesvios.reduce((a, b) => a + b, 0) / historialDesvios.length) * 100;
            document.getElementById('kpi').innerText = promedio.toFixed(2) + "%";

            document.getElementById('odoo').value = "";
            document.getElementById('real').value = "";
        }
    </script>
</body>
</html>
