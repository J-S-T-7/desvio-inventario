<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Auditoría de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Optimización para comodidad visual */
        .row-active:focus-within { background-color: #f1f5f9 !important; }
        input:focus { transform: scale(1.02); transition: all 0.2s; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .shadow-xl { box-shadow: none !important; border: 1px solid #e2e8f0; }
            .print-table { border: 1px solid #000; }
            .sticky-header { position: static !important; }
        }
        
        .sticky-header { position: sticky; top: 0; z-index: 10; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#f8fafc] p-2 md:p-6 font-sans text-slate-800">

    <div class="max-w-[1200px] mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
        
        <!-- CABECERA ESTILO DASHBOARD -->
        <header class="bg-[#0f172a] p-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-indigo-500">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-500 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-white text-xl font-black uppercase tracking-tight">Control de Existencias</h1>
                    <p class="text-indigo-300 text-[10px] font-mono tracking-widest uppercase">Inventory System v3.0 | Soporte Técnico</p>
                </div>
            </div>
            <div class="flex flex-col items-end gap-1">
                <span id="fechaActual" class="text-slate-400 text-[11px] font-medium"></span>
                <button onclick="window.print()" class="no-print bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-bold text-xs transition-all shadow-lg active:scale-95">
                    GENERAR REPORTE PDF
                </button>
            </div>
        </header>

        <!-- DASHBOARD DE MÉTRICAS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-0 border-b border-slate-100">
            <div class="p-6 flex flex-col items-center justify-center border-r border-slate-100 bg-slate-50/50">
                <canvas id="chartEstados" style="max-height: 140px;"></canvas>
            </div>
            <div class="p-6 flex flex-col items-center justify-center border-r border-slate-100">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Precisión General</span>
                <div class="flex items-baseline gap-1">
                    <span id="precisionKpi" class="text-5xl font-black text-slate-800 tracking-tighter">100%</span>
                </div>
                <div id="statusIndicator" class="mt-2 px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[9px] font-bold uppercase">Estado: Óptimo</div>
            </div>
            <div class="p-6 flex flex-col justify-center gap-4 bg-slate-50/50">
                <div class="flex justify-between items-center">
                    <span class="text-[11px] font-bold text-slate-500 uppercase">Faltantes Críticos:</span>
                    <span id="totalFaltantes" class="text-xl font-black text-rose-600">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[11px] font-bold text-slate-500 uppercase">Ítems Revisados:</span>
                    <span id="totalRevisados" class="text-xl font-black text-slate-700">0/50</span>
                </div>
            </div>
        </div>

        <!-- TABLA DE TRABAJO -->
        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead class="sticky-header shadow-sm">
                    <tr class="bg-slate-800 text-white text-[10px] uppercase tracking-wider">
                        <th class="p-4 text-left">Referencia</th>
                        <th class="p-4 text-left">Producto</th>
                        <th class="p-4 text-center">Factor</th>
                        <th class="p-4 w-28">Odoo (kg/u)</th>
                        <th class="p-4 w-28">Físico (kg/u)</th>
                        <th class="p-4 text-right">Dif. Cajas</th>
                        <th class="p-4 text-center">Estado</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="divide-y divide-slate-100 text-[12px]">
                    <!-- Datos inyectados por JS -->
                </tbody>
            </table>
        </div>

        <!-- FOOTER / FIRMAS -->
        <footer class="p-10 bg-slate-50 border-t border-slate-200">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 max-w-[800px] mx-auto">
                <div class="text-center">
                    <div class="h-[1px] bg-slate-300 mb-3 mx-auto w-48"></div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Responsable de Inventario</p>
                </div>
                <div class="text-center">
                    <div class="h-[1px] bg-slate-300 mb-3 mx-auto w-48"></div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Soporte Técnico / Auditoría</p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const data = [
            { id: "PTEM2039", nom: "BIFE VEG - Pack", div: 12 },
            { id: "PTEM1179", nom: "CHAPARRITA SALCHI ROLL", div: 20 },
            { id: "PTHA3105", nom: "CHORIZO VEGGIE - GRANEL", div: 1 },
            { id: "PTEM2040", nom: "CHORIZO VEGGIE - PACK", div: 12 },
            { id: "PTHA3123", nom: "HAMB POROTO NEGRO - GRANEL", div: 1 },
            { id: "PTHA3160", nom: "HAMBURGUESA DARK SIDE HORECA (60 unid)", div: 1 },
            { id: "PTHA1197", nom: "HAMBURGUESA DARK SIDE UNITARIA", div: 20 },
            { id: "PTHA1198", nom: "HAMBURGUESA DE SEITAN UNITARIA", div: 20 },
            { id: "PTHA2041", nom: "HAMBURGUESA GARBANZO - PACK", div: 1 },
            { id: "PTHA3106", nom: "HAMBURGUESA GARBANZO - GRANEL", div: 1 },
            { id: "PTHA3107", nom: "HAMBURGUESA LENTEJA - GRANEL", div: 1 },
            { id: "PTHA3108", nom: "HAMBURGUESA SEITAN - GRANEL", div: 1 },
            { id: "PTHA2043", nom: "HAMBURGUESA SEITAN - Pack", div: 8 },
            { id: "PTMY3110", nom: "HORECA - MAYONESA GRANEL(caja 6 kg)", div: 1 },
            { id: "PTMY3252", nom: "HORECA - SALSA CHEDDAR GRANEL(caja 6 kg)", div: 1 },
            { id: "PTMY1269", nom: "SALSA CHEDDAR 350 GRS DOYPACK", div: 12 },
            { id: "PTMY1270", nom: "MAYONESA V 350 GRS DOYPACK", div: 12 },
            { id: "MPEM1175", nom: "JAMONADA VEG - PACK", div: 10 },
            { id: "PTEM1166", nom: "JAMON AHUMADO HORECA(CAJA 4 KILOS)", div: 1 },
            { id: "PTEM2044", nom: "JAMON AHUMADO VEG - PACK", div: 20 },
            { id: "PTEM1147", nom: "JAMON AHUMADO DESPUNTE (6 kilos)", div: 1 },
            { id: "PTEM2100", nom: "JAMON DORADO - PACK", div: 10 },
            { id: "PTHA3262", nom: "MECHADA VEGGIE 500 GRS", div: 3 },
            { id: "PTKT1185", nom: "QUESO CHEDDAR 200 GR VEGANO", div: 10 },
            { id: "MPIN1205", nom: "QUESO CHEDDAR MAMA MOZA BLOQUE 2,5", div: 2.5 },
            { id: "PTIN1217", nom: "QUESO MAMA MOZA GRANULADO (1 KG)", div: 1 },
            { id: "PTKT1187", nom: "QUESO MOZZARELLA 200 GR VEGANO", div: 10 },
            { id: "MPIN2189", nom: "QUESO MOZZARELA MAMA MOZA BLOQUE 2,5", div: 2.5 },
            { id: "MPEM3235", nom: "QUESO VEGAN CHEDDY VEGUSTA BLOQUE 2,5", div: 2.5 },
            { id: "S/C", nom: "QUESO VEGAN CHEDDY VEGUSTA GRANULADO (1 KG)", div: 1 },
            { id: "PTEM1233", nom: "QUESO VEGAN CHEDDY VEGUSTA Pack 200g", div: 10 },
            { id: "MPEM3234", nom: "QUESO MOZZARELA VEGAN MOZA BLOQUE 2,5", div: 2.5 },
            { id: "PTSA1237", nom: "QUESO VEGAN MOZZA VEGUSTA GRANULADO (1 KG)", div: 1 },
            { id: "PTEM1232", nom: "QUESO VEGAN MOZZA VEGUSTA PACK 200G", div: 10 },
            { id: "PTEM1199", nom: "SALCHICHA HAPPY DOGS GRANEL 17 CM", div: 1 },
            { id: "PTEM1215", nom: "SALCHICHA VEGUSTA HAPPY DOGS - PACK 14 CM", div: 20 },
            { id: "PTEM3192", nom: "SALCHICHA VEGUSTA PLANT B GRANEL 20 CM", div: 1 },
            { id: "PTEM1257", nom: "SEITAN CHURRASCO CARNE PACK 500GR", div: 10 },
            { id: "PTEM1263", nom: "SEITAN CHURRASCO TRADICIONAL PACK 500GR", div: 10 },
            { id: "MPEM1266", nom: "SEITAN CARNE (TROCITOS) PACK 500GR", div: 10 },
            { id: "MPEV0268", nom: "SEITAN TRADICIONAL (TROCITOS) PACK 500GR", div: 10 },
            { id: "PTEM1221", nom: "TOFU VEGUSTA 1 kg", div: 6 },
            { id: "PTEM1220", nom: "TOFU VEGUSTA 500 GRS", div: 6 },
            { id: "PTEM2147", nom: "VEGAN ROLL PACK 10 UNID", div: 12 },
            { id: "PTEM1218", nom: "VEGGIEBALL DOYPACK 8 UNIDADES", div: 8 },
            { id: "PTEM1181", nom: "VEGGIEBALL HORECA", div: 120 },
            { id: "PTEM3115", nom: "VIENESA VEGGIE - GRANEL", div: 1 },
            { id: "PTEM2047", nom: "VIENESA VEGGIE - PACK", div: 20 },
            { id: "MPIN2016", nom: "Gluten vital de trigo", div: 25 },
            { id: "PTKT3148", nom: "VEGAN ROLL GRANEL CAJA 100 UNID", div: 1 }
        ];

        document.getElementById('fechaActual').innerText = new Date().toLocaleString('es-ES', { dateStyle: 'full', timeStyle: 'short' });
        const tbody = document.getElementById('cuerpoTabla');
        let valores = data.map(() => ({ odoo: 0, real: 0 }));
        let myChart;

        // Renderizado
        data.forEach((p, i) => {
            const row = `
                <tr class="row-active transition-colors group">
                    <td class="p-4 font-mono font-bold text-indigo-500 bg-slate-50/30">${p.id}</td>
                    <td class="p-4 font-bold text-slate-600 uppercase tracking-tight">${p.nom}</td>
                    <td class="p-4 text-center font-bold text-slate-400 border-x border-slate-50">${p.div}</td>
                    <td class="p-3">
                        <input type="number" step="any" oninput="calc(${i}, this.value, 'odoo')" class="no-print w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-right font-bold text-slate-700 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        <span class="hidden print:block text-right font-bold">${valores[i].odoo}</span>
                    </td>
                    <td class="p-3">
                        <input type="number" step="any" oninput="calc(${i}, this.value, 'real')" class="no-print w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-right font-bold text-slate-700 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        <span class="hidden print:block text-right font-bold">${valores[i].real}</span>
                    </td>
                    <td class="p-4 text-right font-black text-sm" id="dif-${i}">0.00</td>
                    <td class="p-4 text-center" id="stat-${i}">
                        <span class="text-slate-300 font-black">--</span>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        });

        function initChart() {
            const ctx = document.getElementById('chartEstados').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['CONFORME', 'FALTANTE', 'SOBRANTE'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#10b981', '#f43f5e', '#6366f1'],
                        hoverOffset: 4,
                        borderWidth: 0
                    }]
                },
                options: { 
                    cutout: '75%', 
                    plugins: { 
                        legend: { display: true, position: 'bottom', labels: { boxWidth: 8, font: { size: 9, weight: '900' }, padding: 15 } } 
                    } 
                }
            });
        }

        function calc(i, val, tipo) {
            valores[i][tipo] = parseFloat(val) || 0;
            const printSpans = document.querySelectorAll(`span.print\\:block`);
            printSpans[i * 2 + (tipo === 'odoo' ? 0 : 1)].innerText = val || 0;

            const boxOdoo = valores[i].odoo / data[i].div;
            const dif = valores[i].real - boxOdoo;
            
            const elDif = document.getElementById(`dif-${i}`);
            elDif.innerText = dif.toFixed(2);
            elDif.className = `p-4 text-right font-black ${dif < -0.01 ? 'text-rose-600' : (dif > 0.01 ? 'text-indigo-600' : 'text-slate-800')}`;

            const elStat = document.getElementById(`stat-${i}`);
            if (Math.abs(dif) < 0.01) {
                elStat.innerHTML = '<span class="text-emerald-500 font-black text-[10px] bg-emerald-50 px-2 py-1 rounded border border-emerald-100 uppercase">Ok</span>';
            } else {
                const color = dif < 0 ? 'rose' : 'indigo';
                elStat.innerHTML = `<span class="text-${color}-600 font-black text-[10px] bg-${color}-50 px-2 py-1 rounded border border-${color}-100 uppercase">${dif < 0 ? 'Faltante' : 'Sobrante'}</span>`;
            }
            updateStats();
        }

        function updateStats() {
            let ok = 0, faltan = 0, sobra = 0, sumAbsDif = 0, sumCajas = 0, revisados = 0;

            valores.forEach((v, i) => {
                const boxOdoo = v.odoo / data[i].div;
                const dif = v.real - boxOdoo;
                if (v.odoo > 0 || v.real > 0) {
                    revisados++;
                    if (Math.abs(dif) < 0.01) ok++;
                    else if (dif < 0) faltan++;
                    else sobra++;
                }
                sumAbsDif += Math.abs(dif);
                sumCajas += boxOdoo;
            });

            myChart.data.datasets[0].data = [ok, faltan, sobra];
            myChart.update();

            const precision = sumCajas === 0 ? 100 : Math.max(0, 100 - (sumAbsDif / sumCajas * 100));
            document.getElementById('precisionKpi').innerText = precision.toFixed(1) + "%";
            document.getElementById('totalFaltantes').innerText = faltan;
            document.getElementById('totalRevisados').innerText = `${revisados}/${data.length}`;
            
            const indicator = document.getElementById('statusIndicator');
            if(precision >= 98) {
                indicator.className = "mt-2 px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-[9px] font-bold uppercase";
                indicator.innerText = "Estado: Óptimo";
            } else {
                indicator.className = "mt-2 px-3 py-1 bg-rose-100 text-rose-700 rounded-full text-[9px] font-bold uppercase";
                indicator.innerText = "Estado: Revisión Requerida";
            }
        }

        initChart();
    </script>
</body>
</html>
