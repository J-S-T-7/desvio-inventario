<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Stock - Soporte Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- LIBRERÍA EXCEL (CORREGIDA) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .row-active:focus-within { background-color: #f8fafc !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-6">

    <div class="max-w-[1200px] mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
        <header class="bg-[#1e293b] p-6 flex justify-between items-center border-b-4 border-indigo-500">
            <h1 class="text-white text-xl font-black uppercase">Auditoría de Stock</h1>
            <div class="flex gap-2 no-print">
                <!-- Botón de Excel con ID para asegurar el evento -->
                <button id="btnExcel" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold text-xs shadow-lg flex items-center gap-2">
                    EXCEL
                </button>
                <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold text-xs shadow-lg">
                    PDF
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-0 border-b bg-slate-50/30">
            <div class="p-6 flex justify-center border-r"><canvas id="chartEstados" style="max-height: 120px;"></canvas></div>
            <div class="p-6 flex flex-col items-center justify-center">
                <span class="text-[10px] font-black text-slate-400 uppercase">Precisión</span>
                <span id="precisionKpi" class="text-6xl font-black text-slate-800">100%</span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-800 text-white text-[10px] uppercase">
                    <tr>
                        <th class="p-4 text-left">Ref.</th>
                        <th class="p-4 text-left">Producto</th>
                        <th class="p-4">Odoo</th>
                        <th class="p-4">Físico</th>
                        <th class="p-4 text-right">Dif.</th>
                        <th class="p-4 text-center">Estado</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="text-[12px] divide-y"></tbody>
            </table>
        </div>
    </div>

    <script>
        const data = [
            { id: "PTEM2039", nom: "BIFE VEG - Pack", div: 12 },
            { id: "PTEM1179", nom: "CHAPARRITA SALCHI ROLL", div: 20 },
            { id: "PTHA3105", nom: "CHORIZO VEGGIE - GRANEL", div: 1 },
            { id: "PTEM2040", nom: "CHORIZO VEGGIE - PACK", div: 12 }
            // Agrega el resto de tus productos aquí...
        ];

        let valores = data.map(() => ({ odoo: 0, real: 0 }));
        let myChart;

        function init() {
            const tbody = document.getElementById('cuerpoTabla');
            data.forEach((p, i) => {
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="row-active">
                        <td class="p-4 font-bold text-indigo-500">${p.id}</td>
                        <td class="p-4 uppercase">${p.nom}</td>
                        <td class="p-2"><input type="number" oninput="calc(${i}, this.value, 'odoo')" class="w-full border rounded p-1 text-right"></td>
                        <td class="p-2"><input type="number" oninput="calc(${i}, this.value, 'real')" class="w-full border rounded p-1 text-right"></td>
                        <td class="p-4 text-right font-black" id="dif-${i}">0.00</td>
                        <td class="p-4 text-center" id="stat-${i}">--</td>
                    </tr>
                `);
            });

            const ctx = document.getElementById('chartEstados').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['OK', 'Faltante', 'Sobrante'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#10b981', '#f43f5e', '#6366f1'] }] },
                options: { plugins: { legend: { display: false } } }
            });

            // Asignar evento al botón de Excel
            document.getElementById('btnExcel').addEventListener('click', exportarExcel);
        }

        function calc(i, val, tipo) {
            valores[i][tipo] = parseFloat(val) || 0;
            const dif = valores[i].real - (valores[i].odoo / data[i].div);
            document.getElementById(`dif-${i}`).innerText = dif.toFixed(2);
            document.getElementById(`stat-${i}`).innerText = Math.abs(dif) < 0.01 ? "OK" : (dif < 0 ? "Faltante" : "Sobrante");
            updateUI();
        }

        function updateUI() {
            let ok = 0, faltan = 0, sobra = 0;
            valores.forEach((v, i) => {
                const dif = v.real - (v.odoo / data[i].div);
                if (v.odoo > 0 || v.real > 0) {
                    if (Math.abs(dif) < 0.01) ok++;
                    else if (dif < 0) faltan++;
                    else sobra++;
                }
            });
            myChart.data.datasets[0].data = [ok, faltan, sobra];
            myChart.update();
        }

        function exportarExcel() {
            try {
                const rows = data.map((p, i) => {
                    const dif = valores[i].real - (valores[i].odoo / p.div);
                    return {
                        "REF": p.id,
                        "PRODUCTO": p.nom,
                        "FACTOR": p.div,
                        "ODOO": valores[i].odoo,
                        "FISICO": valores[i].real,
                        "DIFERENCIA": parseFloat(dif.toFixed(2)),
                        "ESTADO": Math.abs(dif) < 0.01 ? "OK" : (dif < 0 ? "FALTANTE" : "SOBRANTE")
                    };
                });

                const ws = XLSX.utils.json_to_sheet(rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Auditoria");
                XLSX.writeFile(wb, "Reporte_Inventario.xlsx");
            } catch (error) {
                console.error("Error al exportar:", error);
                alert("Error al generar el archivo Excel. Revisa la consola.");
            }
        }

        init();
    </script>
</body>
</html>
