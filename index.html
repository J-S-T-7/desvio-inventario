<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Profesional de Inventario - Soporte Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .shadow-2xl { shadow: none; border: 1px solid #ddd; }
            .page-break { page-break-before: always; }
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 p-4 font-sans text-slate-900">
    <div class="max-w-[1100px] mx-auto bg-white shadow-2xl rounded-xl overflow-hidden print:shadow-none">
        
        <!-- ENCABEZADO PROFESIONAL -->
        <div class="bg-slate-900 p-8 flex justify-between items-center border-b-8 border-indigo-600">
            <div>
                <h1 class="text-white text-3xl font-black tracking-tighter uppercase">Informe de Auditoría de Inventario</h1>
                <p class="text-indigo-400 font-mono text-sm uppercase tracking-widest">Departamento de Sistemas | Control de Activos</p>
            </div>
            <div class="text-right text-slate-400 text-xs">
                <p id="fechaActual"></p>
                <button onclick="window.print()" class="no-print mt-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full font-bold transition shadow-lg">
                    IMPRIMIR REPORTE PDF
                </button>
            </div>
        </div>

        <!-- DASHBOARD DE GRÁFICOS (Solo visibles si hay datos) -->
        <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8 bg-slate-50 border-b">
            <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center">Estado General de Productos</h3>
                <canvas id="chartEstados" style="max-height: 200px;"></canvas>
            </div>
            <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-2 text-center">Precisión del Conteo</h3>
                <p id="precisionKpi" class="text-6xl font-black text-slate-800">100%</p>
                <p class="text-[10px] text-slate-500 font-bold uppercase mt-2">Nivel de Confianza</p>
            </div>
        </div>

        <!-- TABLA DE DATOS -->
        <div class="p-0">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-white text-[10px] uppercase font-bold">
                        <th class="p-4">Ref. Interna</th>
                        <th class="p-4">Descripción</th>
                        <th class="p-4 text-center">Factor</th>
                        <th class="p-4 w-24">Odoo</th>
                        <th class="p-4 w-24">Físico</th>
                        <th class="p-4 text-right">Dif. Cajas</th>
                        <th class="p-4 text-center">Estado</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="text-[12px] divide-y divide-slate-100">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>

        <!-- SECCIÓN DE FIRMAS (Para el PDF) -->
        <div class="p-12 grid grid-cols-2 gap-20 mt-10 border-t bg-slate-50">
            <div class="text-center">
                <div class="border-t-2 border-slate-300 pt-2 text-slate-600 font-bold uppercase text-[10px]">
                    Firma Responsable Bodega
                </div>
            </div>
            <div class="text-center">
                <div class="border-t-2 border-slate-300 pt-2 text-slate-600 font-bold uppercase text-[10px]">
                    Firma Soporte Técnico / Auditoría
                </div>
            </div>
        </div>
    </div>

    <script>
        const data = [
            { id: "PTEM2039", nom: "BIFE VEG - Pack", div: 12 },
            { id: "PTEM1179", nom: "CHAPARRITA SALCHI ROLL", div: 20 },
            { id: "PTHA3105", nom: "CHORIZO VEGGIE - GRANEL", div: 1 },
            { id: "PTEM2040", nom: "CHORIZO VEGGIE - PACK", div: 12 },
            { id: "PTHA3123", nom: "HAMB POROTO NEGRO - GRANEL", div: 1 },
            { id: "PTHA3160", nom: "HAMBURGUESA DARK SIDE HORECA (60 unid)", div: 1 },
            { id: "PTHA1197", nom: "HAMBURGUESA DARK SIDE UNITARIA", div: 20 },
            { id: "PTHA1198", nom: "HAMBURGUESA DE SEITAN UNITARIA", div: 20 },
            { id: "PTHA2041", nom: "HAMBURGUESA GARBANZO - PACK", div: 1 },
            { id: "PTHA3106", nom: "HAMBURGUESA GARBANZO - GRANEL", div: 1 },
            { id: "PTHA3107", nom: "HAMBURGUESA LENTEJA - GRANEL", div: 1 },
            { id: "PTHA3108", nom: "HAMBURGUESA SEITAN - GRANEL", div: 1 },
            { id: "PTHA2043", nom: "HAMBURGUESA SEITAN - Pack", div: 8 },
            { id: "PTMY3110", nom: "HORECA - MAYONESA GRANEL(caja 6 kg)", div: 1 },
            { id: "PTMY3252", nom: "HORECA - SALSA CHEDDAR GRANEL(caja 6 kg)", div: 1 },
            { id: "PTMY1269", nom: "SALSA CHEDDAR 350 GRS DOYPACK", div: 12 },
            { id: "PTMY1270", nom: "MAYONESA V 350 GRS DOYPACK", div: 12 },
            { id: "MPEM1175", nom: "JAMONADA VEG - PACK", div: 10 },
            { id: "PTEM1166", nom: "JAMON AHUMADO HORECA(CAJA 4 KILOS)", div: 1 },
            { id: "PTEM2044", nom: "JAMON AHUMADO VEG - PACK", div: 20 },
            { id: "PTEM1147", nom: "JAMON AHUMADO DESPUNTE (6 kilos)", div: 1 },
            { id: "PTEM2100", nom: "JAMON DORADO - PACK", div: 10 },
            { id: "PTHA3262", nom: "MECHADA VEGGIE 500 GRS", div: 3 },
            { id: "PTKT1185", nom: "QUESO CHEDDAR 200 GR VEGANO", div: 10 },
            { id: "MPIN1205", nom: "QUESO CHEDDAR MAMA MOZA BLOQUE 2,5", div: 2.5 },
            { id: "PTIN1217", nom: "QUESO MAMA MOZA GRANULADO (1 KG)", div: 1 },
            { id: "PTKT1187", nom: "QUESO MOZZARELLA 200 GR VEGANO", div: 10 },
            { id: "MPIN2189", nom: "QUESO MOZZARELA MAMA MOZA BLOQUE 2,5", div: 2.5 },
            { id: "MPEM3235", nom: "QUESO VEGAN CHEDDY VEGUSTA BLOQUE 2,5", div: 2.5 },
            { id: "S/C", nom: "QUESO VEGAN CHEDDY VEGUSTA GRANULADO (1 KG)", div: 1 },
            { id: "PTEM1233", nom: "QUESO VEGAN CHEDDY VEGUSTA Pack 200g", div: 10 },
            { id: "MPEM3234", nom: "QUESO MOZZARELA VEGAN MOZA BLOQUE 2,5", div: 2.5 },
            { id: "PTSA1237", nom: "QUESO VEGAN MOZZA VEGUSTA GRANULADO (1 KG)", div: 1 },
            { id: "PTEM1232", nom: "QUESO VEGAN MOZZA VEGUSTA PACK 200G", div: 10 },
            { id: "PTEM1199", nom: "SALCHICHA HAPPY DOGS GRANEL 17 CM", div: 1 },
            { id: "PTEM1215", nom: "SALCHICHA VEGUSTA HAPPY DOGS - PACK 14 CM", div: 20 },
            { id: "PTEM3192", nom: "SALCHICHA VEGUSTA PLANT B GRANEL 20 CM", div: 1 },
            { id: "PTEM1257", nom: "SEITAN CHURRASCO CARNE PACK 500GR", div: 10 },
            { id: "PTEM1263", nom: "SEITAN CHURRASCO TRADICIONAL PACK 500GR", div: 10 },
            { id: "MPEM1266", nom: "SEITAN CARNE (TROCITOS) PACK 500GR", div: 10 },
            { id: "MPEV0268", nom: "SEITAN TRADICIONAL (TROCITOS) PACK 500GR", div: 10 },
            { id: "PTEM1221", nom: "TOFU VEGUSTA 1 kg", div: 6 },
            { id: "PTEM1220", nom: "TOFU VEGUSTA 500 GRS", div: 6 },
            { id: "PTEM2147", nom: "VEGAN ROLL PACK 10 UNID", div: 12 },
            { id: "PTEM1218", nom: "VEGGIEBALL DOYPACK 8 UNIDADES", div: 8 },
            { id: "PTEM1181", nom: "VEGGIEBALL HORECA", div: 120 },
            { id: "PTEM3115", nom: "VIENESA VEGGIE - GRANEL", div: 1 },
            { id: "PTEM2047", nom: "VIENESA VEGGIE - PACK", div: 20 },
            { id: "MPIN2016", nom: "Gluten vital de trigo", div: 25 },
            { id: "PTKT3148", nom: "VEGAN ROLL GRANEL CAJA 100 UNID", div: 1 }
        ];

        document.getElementById('fechaActual').innerText = new Date().toLocaleString();
        const tbody = document.getElementById('cuerpoTabla');
        let valores = data.map(() => ({ odoo: 0, real: 0 }));
        let myChart;

        // Renderizado inicial
        data.forEach((p, i) => {
            const row = `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-mono font-bold text-indigo-600">${p.id}</td>
                    <td class="p-4 font-semibold text-slate-700 uppercase">${p.nom}</td>
                    <td class="p-4 text-center font-bold text-slate-400">${p.div}</td>
                    <td class="p-4">
                        <input type="number" oninput="calc(${i}, this.value, 'odoo')" class="no-print w-full bg-slate-100 border border-slate-200 rounded px-2 py-1 text-right focus:bg-white focus:border-indigo-500 outline-none">
                        <span class="hidden print:block text-right">${valores[i].odoo}</span>
                    </td>
                    <td class="p-4">
                        <input type="number" oninput="calc(${i}, this.value, 'real')" class="no-print w-full bg-slate-100 border border-slate-200 rounded px-2 py-1 text-right focus:bg-white focus:border-indigo-500 outline-none">
                        <span class="hidden print:block text-right">${valores[i].real}</span>
                    </td>
                    <td class="p-4 text-right font-black" id="dif-${i}">0.00</td>
                    <td class="p-4 text-center" id="stat-${i}">--</td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        });

        function initChart() {
            const ctx = document.getElementById('chartEstados').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['OK', 'Faltantes', 'Sobrantes'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#10b981', '#ef4444', '#6366f1'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10, weight: 'bold' } } } } }
            });
        }

        function calc(i, val, tipo) {
            valores[i][tipo] = parseFloat(val) || 0;
            const inputElements = document.querySelectorAll(`span.print\\:block`);
            inputElements[i * 2 + (tipo === 'odoo' ? 0 : 1)].innerText = val || 0;

            const boxesOdoo = valores[i].odoo / data[i].div;
            const dif = valores[i].real - boxesOdoo;
            
            const elDif = document.getElementById(`dif-${i}`);
            elDif.innerText = dif.toFixed(2);
            elDif.className = `p-4 text-right font-black ${dif < -0.01 ? 'text-rose-600' : (dif > 0.01 ? 'text-indigo-600' : 'text-slate-700')}`;

            const elStat = document.getElementById(`stat-${i}`);
            if (Math.abs(dif) < 0.01) {
                elStat.innerHTML = '<span class="text-emerald-600 font-black italic">CONFORME</span>';
            } else {
                elStat.innerHTML = `<span class="${dif < 0 ? 'text-rose-600' : 'text-indigo-600'} font-black italic">${dif < 0 ? 'DESVÍO (-)' : 'SOBRANTE (+)'}</span>`;
            }
            updateUI();
        }

        function updateUI() {
            let ok = 0, faltan = 0, sobra = 0, sumAbsDif = 0, sumCajas = 0;

            valores.forEach((v, i) => {
                const boxesOdoo = v.odoo / data[i].div;
                const dif = v.real - boxesOdoo;
                if (v.odoo > 0 || v.real > 0) {
                    if (Math.abs(dif) < 0.01) ok++;
                    else if (dif < 0) faltan++;
                    else sobra++;
                }
                sumAbsDif += Math.abs(dif);
                sumCajas += boxesOdoo;
            });

            myChart.data.datasets[0].data = [ok, faltan, sobra];
            myChart.update();

            const precision = sumCajas === 0 ? 100 : Math.max(0, 100 - (sumAbsDif / sumCajas * 100));
            const elPrec = document.getElementById('precisionKpi');
            elPrec.innerText = precision.toFixed(1) + "%";
            elPrec.className = `text-6xl font-black ${precision < 95 ? 'text-rose-600' : 'text-slate-800'}`;
        }

        initChart();
    </script>
</body>
</html>
